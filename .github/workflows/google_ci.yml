name: Flutter Professional CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      # تأكد من الفورمات قبل إضافة ملفات الـ Dummy
      - name: Check Formatting
        run: dart format --set-exit-if-changed .

      # خطوة حل مشكلة الملفات الناقصة (تم إزالة الـ import غير المستخدم)
      - name: Create Dummy Env Files
        run: |
          mkdir -p lib/core/env
          echo "class AppEnv { AppEnv._(); static String get stripePublishableKey => ''; static String get stripeSecretKey => ''; static String get stripeCustomerId => ''; static String get otpPasswordAccount => ''; static String get stripeRestrictedKey => ''; static bool get isConfigured => false; }" > lib/core/env/app_env.dart
          mkdir -p assets
          touch assets/.env

      - name: Run Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
