name: Flutter Professional CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # زيادة رامات الـ Java لضمان عدم فشل الـ Release build
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Check Formatting
        run: dart format --set-exit-if-changed .

      - name: Create Dummy Env Files
        run: |
          mkdir -p lib/core/env
          echo "class AppEnv { AppEnv._(); static String get stripePublishableKey => ''; static String get stripeSecretKey => ''; static String get stripeCustomerId => ''; static String get otpPasswordAccount => ''; static String get stripeRestrictedKey => ''; static bool get isConfigured => false; }" > lib/core/env/app_env.dart
          mkdir -p assets
          touch assets/.env

      - name: Run Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build APK (Release & Optimized)
        run: |
          # --release: للإنتاج الفعلي وبحجم أصغر
          # --split-per-abi: بيقسم الـ APK لملفات أصغر حسب نوع المعالج (v7, v8, x64)
          # --obfuscate: بيخفي أسماء الكلاسات والـ methods لزيادة الأمان وتقليل الحجم
          flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-release-apks
          # بنرفع كل الـ APKS اللي نتجت عن الـ split
          path: build/app/outputs/flutter-apk/app-*-release.apk