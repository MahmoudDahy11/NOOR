# Gradle JVM optimizations for 8GB RAM
# تقليل الـ Heap لـ 2.5 جيجا كحد أقصى لترك مساحة للنظام والـ VS Code
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=512m -XX:+UseG1GC -XX:+ParallelRefProcEnabled -Dfile.encoding=UTF-8

# Enable parallel build
# تفعيل البناء الموازي
org.gradle.parallel=true
# تقليل عدد الـ workers لـ 2 أو 4 لتجنب استهلاك الـ CPU بالكامل
org.gradle.workers.max=4

# Daemon settings
org.gradle.daemon=true
# تقليل وقت خمول الـ Daemon ليغلق نفسه أسرع ويوفر رام عند التوقف عن العمل
org.gradle.daemon.idletimeout=1000000

# Android settings
android.useAndroidX=true
android.enableJetifier=true

# Build optimization
# تسريع عملية الـ Incremental build
org.gradle.caching=true
android.enableR8=true
android.enableDexingArtifactTransform=true